<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Access Your Web3 Hub</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body class="auth-wrapper">
    <!-- Auth Toggles -->
    <div class="auth-toggles">
        <button id="theme-toggle" class="toggle-btn">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn">RTL</button>
    </div>

    <div class="auth-card animate-left">
        <div class="text-center mb-5">
            <a href="index.html" class="navbar-brand d-block mb-3">
                <i class="bi bi-cpu-fill me-2"></i>WEB3.DEV
            </a>
            <h2 class="fw-bold mb-0">Welcome Back</h2>
            <p class="text-secondary small mt-2">Connect to your decentralized dashboard.</p>
        </div>

        <form>
            <div class="mb-4">
                <label class="form-label text-secondary small">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-card border-secondary text-secondary"><i
                            class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-card border-secondary text-secondary"><i
                            class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4 gap-2">
                <div class="form-check mb-0">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-secondary small text-nowrap" for="rememberMe">Remember
                        me</label>
                </div>
                <a href="#" class="text-info text-decoration-none small text-nowrap">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary-web3 w-100 py-3 mb-4">Sign In</button>
            <div class="text-center mb-4">
                <p class="text-secondary small mb-0">or continue with</p>
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <button type="button" class="btn btn-outline-web3 px-4 py-2"><i class="bi bi-google"></i></button>
                    <button type="button" class="btn btn-outline-web3 px-4 py-2"><i class="bi bi-facebook"></i></button>
                </div>
            </div>
            <p class="text-center text-secondary small mb-0">Don't have an account? <a href="signup.html"
                    class="text-info text-decoration-none">Sign Up</a></p>
        </form>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
