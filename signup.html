<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Web3 Dev Portfolio</title>
    <meta name="description"
        content="Create a new account on the Web3 developer portfolio website.">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>

    <div class="auth-toggles">
        <button id="theme-toggle" class="toggle-btn">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn">RTL</button>
    </div>

    <!-- Sign Up Content -->
    <main class="auth-wrapper">
        <div class="auth-card animate-left">
            <div class="text-center mb-5">
                <a class="navbar-brand text-decoration-none d-block mb-4" href="index.html">
                    <i class="bi bi-cpu-fill me-2"></i>WEB3.DEV
                </a>
                <h2 class="display-6 fw-bold mt-3">Create Account</h2>
                <p class="text-secondary">Join our decentralized ecosystem</p>
            </div>
            <form>
                <div class="mb-4">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control py-3 px-4" placeholder="John Doe" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control py-3 px-4" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control py-3 px-4" placeholder="••••••••" required>
                        <span class="password-toggle">
                            <i class="bi bi-eye-fill"></i>
                        </span>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Confirm Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control py-3 px-4" placeholder="••••••••" required>
                        <span class="password-toggle">
                            <i class="bi bi-eye-fill"></i>
                        </span>
                    </div>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small text-secondary" for="terms">
                        I agree to the <a href="#" class="text-info text-decoration-none hover-underline">Terms of Service</a> and <a href="#" class="text-info text-decoration-none hover-underline">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary-web3 w-100 py-3 mt-2">Sign Up</button>
                
                <!-- Social Sign Up Section -->
                <div class="text-center mt-5">
                    <p class="text-secondary small text-uppercase fw-bold mb-3">Or sign up with</p>
                    <div class="social-login-grid btn-group-responsive">
                        <a href="#" class="social-btn" title="Google"><i class="bi bi-google"></i></a>
                        <a href="#" class="social-btn" title="Facebook"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="social-btn" title="Apple"><i class="bi bi-apple"></i></a>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <p class="text-secondary mb-0">Already have an account? <a href="login.html" class="text-info text-decoration-none fw-bold hover-underline">Login</a></p>
                </div>
            </form>
        </div>
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>

</html>
